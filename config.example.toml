[ga]
root = "/tmp/GenericAgent"
python = "python3"
default_llm_no = 0
turn_timeout_sec = 900
session_idle_ttl_sec = 43200

[wechat]
allowed_users = []
token_file = "~/.wxbot/token.json"
# process health heartbeat is written beside token_file as `health.json`
media_dir = "./state/media"
voice_encoder_cmd = ""
# optional explicit restart command for /restart; if blank, falls back to relaunching
# `python -m ga_wechat_clawbot.cli --config <current-config> serve`
restart_command = ""
# progress update throttle for the same turn; set to 0 to disable throttling
progress_interval_sec = 12
# processing keepalive / heartbeat interval while a turn is still running
heartbeat_interval_sec = 60
progress_turn_stride = 2

[wechat.command_aliases]
# "帮助" = "/help"
# "状态" = "/status"
# "停止" = "/stop"
# "重启" = "/restart"
# "新建" = "/new"
# "模型" = "/llm"

[storage]
root = "./state"
log_dir = "./state/logs"
